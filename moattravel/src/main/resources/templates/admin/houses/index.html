<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<!-- Bootstrap -->

	<!--Bootstrap
		→デザインを一瞬で整えてくれるCSS集
		class="table"　これだけで、表が綺麗になる。
	-->
	<!--以下のhttps://cdn~みたいなのを記載することで
	ネット上のBootstrapを直接読み込んでいる
	＝自分のプロジェクトのファイルに何も入れることなく装飾が使えている
	-->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

	<!-- Google Fonts -->
	<!-- こちらもBootstrapと同様　
		Googleのサーバーからフォントを借りてきている -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
	<!-- th:href とは
spring特有らしい
SpringはアプリのURLを自動で調整するので
Thymeleafが自動で変換してくれる仕組み
@{} は
「アプリのルートからのパス」の意味
-->
	<link th:href="@{/css/style.css}" rel="stylesheet">

	<title>民宿一覧</title>
</head>

<body>
	<div class="moattravel-wrapper">
		<!-- ヘッダー -->
		<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm moattravel-navbar">
			<div class="container moattravel-container">
				<a class="navbar-brand" th:href="@{/}">
					<!-- th:src とは？
						先程の画像版
						staticフォルダを基準に探す
						（staticの中しか探さないよー）
						ので、ディレクトリは
						<img th:src="@{/images/logo.png}">
						/images/logo.pngのみの記載でアクセスできるってこと
						Springbootでは　staticフォルダの中 = Webのルート
						ということ
					-->
					<img class="moattravel-logo me-1" th:src="@{/images/logo.png}" alt="moat Travel">
				</a>
			</div>
		</nav>

		<main>
			<div class="container pt-4 pb-5 moattravel-container">
				<div class="row justify-content-center">
					<div class="col-xxl-9 col-xl-10 col-lg-11">
						<h1 class="mb-4 text-center">民宿一覧</h1>
						<div class="d-flex justify-content-end">
							<a href="#" class="btn text-white shadow-sm mb-3 moattravel-btn">登録</a>
						</div>

						<table class="table">
							<thead>
								<tr>
									<th scope="col">ID</th>
									<th scope="col">民宿名</th>
									<th scope="col">郵便番号</th>
									<th scope="col">住所</th>
									<th scope="col">電話番号</th>
									<th scope="col"></th>
								</tr>
							</thead>

							<tbody>
								<!-- th:each（繰り返し）
									Controller上で記載した
									model.addAttribute("houses", houses);は
									housesという名前でListをHTMLに渡してる
									という意味であるが
									house(List)の中身を１つずつhouse変数に入れて
									繰り返す、処理をさせている
									→だから実際のWebページでは
									一覧が１つずつ連続して並ぶ表示になっていた
									
								-->

								<tr th:each="house : ${housePage.content}">

									<!-- th:text
										houseオブジェクトの名前を表示している
										house.getName();　みたいな感じ
										Controller上で
										DB → houses(List) → HTMLに渡す
										HTML上で
										th:each で繰り返し
										th:text で中身を表示
										している感じ
										
									-->
									<td th:text="${house.getId()}"></td>
									<td th:text="${house.getName()}"></td>
									<td th:text="${house.getPostalCode()}"></td>
									<td th:text="${house.getAddress()}"></td>
									<td th:text="${house.getPhoneNumber()}"></td>
									<td><a href="#">詳細</a></td>
								</tr>
							</tbody>
						</table>
						<!-- ページネーション-->
						<!--ページネーションとは
							今どこにいるか？
							前に行ける？
							次に行ける？
							全部で何ページ？をPageオブジェクトが教えてくれる
						 -->
						 <!-- th:ifは
						javaでいうところの
						if (条件) {
						   分岐内容
						}
						と同様の役割
						ページ数が>1ならページリンクを出す、それ以外は出さない
						の意味
						
						-->
						<div th:if="${housePage.getTotalPages()>1}" class="d-flex justify-content-center">
							<nav aria-label="民宿一覧ページ">
								<ul class="pagination">
									<li class="page-item">
										<!-- isFirst() と isLast()
											isFirst() 
											→今1ページ目？
											isLast()
											→今最後のページ？
											
											の意味　ifと併せて　1ページ目だったらこの処理を
											最後のページだったらこの処理を
											と、条件分けをしている
										-->
										<span th:if="${housePage.isFirst()}" class="page-link disabled">前</span>
										<a th:unless="${housePage.isFirst()}"
											th:href="@{/admin/houses(page=${housePage.getNumber()-1})}"
											class="page-link moattravel-page-link">前</a>
									</li>
									
									<!--　最後のページになるまで
									～ページ目の表記を繰り返してね　の意味
									※th:each　は繰り返しを意味している
									-->
									<li th:each="i: ${#numbers.sequence(0,housePage.getTotalPages()-1)}"
										class="page-item">
										
										<!-- この分岐…
										数字iが今いるページと一緒ならリンクにしない＋別の色を指定
										
										3ページ目にいるときは3ページ目のリンクに飛べないようにしている処理
										今いるページは押せない。という制御
										-->
										<span th:if="${i == housePage.getNumber()}"
											class="page-link active moattravel-active" th:text="${i + 1}"></span>
											
											<!-- getNumber() の役割
												今いるページ番号の取得
												ただし、0からスタートするからテキスト（ユーザー目線）ではその値に
												+1したものを見せている
												ので、見かけ上は0ページ目が存在していない
											-->
										<a th:unless="${i == housePage.getNumber()}"
											th:href="@{/admin/houses(page = ${i})}"
											class="page-link moattravel-page-link" th:text="${i + 1}"></a>
									</li>
									<li class="page-item">
										<span th:if="${housePage.isLast()}" class="page-link disabled">次</span>
										<a th:unless="${housePage.isLast()}"
											th:href="@{/admin/houses(page = ${housePage.getNumber() + 1})}"
											class="page-link moattravel-page-link">次</a>

									</li>
								</ul>
							</nav>
						</div>
					</div>
				</div>
			</div>
		</main>


		<!-- フッター -->
		<footer>
			<div class="d-flex justify-content-center align-items-center h-100">
				<p class="text-center text-muted small mb-0">&copy; moat Travel All rights reserved</p>

			</div>
		</footer>

	</div>

	<!-- Bootstrap -->

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
		crossorigin="anonymous"></script>




</body>

</html>
