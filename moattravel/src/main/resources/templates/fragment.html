<!DOCTYPE html>
<!--【Thymeleafの部品化】

HTMLの共通部分を「部品」として登録し、
別のHTMLページから呼び出して使うことができる。

同じ設定（meta / css / header / footer など）を
毎ページに書く必要がなくなり、効率化できる。

■ 部品化
th:fragment を使う

例
<div th:fragment="meta">
    <meta charset="UTF-8">
</div>

これで "meta" という名前の部品として登録される。


■ 別ページで呼び出す

<div th:replace="layout/meta :: meta"></div>

意味
layout/meta.html の
meta 部品を呼び出す


■ th:remove="tag"

外側のタグだけ削除し、
中身のHTMLだけを出力する。

例

<div th:fragment="meta" th:remove="tag">
    <meta charset="UTF-8">
</div>

→ 呼び出し結果

<meta charset="UTF-8">

divタグは出力されない
-->
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<!-- meta要素の部品化-->
	<div th:fragment="meta" th:remove="tag">
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
	</div>

	<!-- link要素の部品化-->
	<div th:fragment="styles" th:remove="tag">
		<!-- Bootstrap -->
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
			integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
		<!-- Google Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
		<link th:href="@{/css/style.css}" rel="stylesheet">
	</div>

	<title>部品化用のHTMLファイル</title>
</head>

<body>
	<!-- ヘッダーの部品化-->
	<div th:fragment="header" th:remove="tag">
		<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm moattravel-navbar">
			<div class="container moattravel-container">
				<a class="navbar-brand" th:href="@{/}">
					<img class="moattravel-logo me-1" th:src="@{/images/logo.png}" alt="moat Travel">
				</a>
			</div>
		</nav>
	</div>


	<!-- フッターの部品化-->
	<div th:fragment="footer" th:remove="tag">
		<footer>
			<div class="d-flex justify-content-center align-items-center h-100">
				<p class="text-center text-muted small mb-0">&copy;moat Travel All rights reserved</p>
			</div>
		</footer>
	</div>

	<!-- script要素の部品化　-->
	<div th:fragment="scripts" th:remove="tag">
		<!-- Bootstrap -->
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
			crossorigin="anonymous"></script>
	</div>
</body>

</html>
